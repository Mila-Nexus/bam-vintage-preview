<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee | BAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requestAnimationFrame(() => {
                setTimeout(() => document.body.classList.add('loaded'), 50);
            });
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700&display=swap');
        body { background-color: #F5EFE6; color: #1A1A1A; }
        .grain-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 50; opacity: 0.08; background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png'); mix-blend-mode: multiply; }
        body { opacity: 0; transition: opacity 0.5s ease-out; }
        body.loaded { opacity: 1; }
        body.exiting { opacity: 0; transition: opacity 0.4s ease-in; }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="grain-overlay"></div>
                <nav class="absolute w-full py-6 px-8 flex justify-between items-center z-50 top-0">
        <a href="index.html" class="text-4xl font-serif tracking-tight text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)]">BAM.</a>
        <div class="hidden md:flex space-x-8 text-sm font-bold uppercase tracking-widest text-white drop-shadow-[0_2px_3px_rgba(0,0,0,0.7)]">
            <a href="coffee.html" class="text-white hover:text-retro-500 transition duration-300">Coffee</a>
            <a href="vintage.html" class="text-white hover:text-retro-500 transition duration-300">Vintage Shop</a>
            <a href="location.html" class="text-white hover:text-retro-500 transition duration-300">Location</a>
        </div>
        <button class="border-2 border-white px-6 py-2 text-sm font-bold uppercase text-white hover:bg-white hover:text-retro-900 transition duration-300 drop-shadow-[0_2px_3px_rgba(0,0,0,0.7)]">Shop Online</button>
    </nav>
    <main class="relative pt-32 pb-24 px-8 md:px-16 max-w-4xl mx-auto text-center border-x-2 border-b-2 border-retro-900 bg-retro-300">
        <h1 class="font-serif text-7xl mb-8 text-retro-900">The Brew.</h1>
        <p class="font-medium text-retro-900 text-lg mb-16 max-w-xl mx-auto">We serve rotating single-origin coffees sourced from Europe's best independent roasters. Black, white, or filter—poured perfectly every time.</p>
        <img src="https://images.squarespace-cdn.com/content/v1/5e7c0e95d016275276f5d62b/c23fc91b-df76-438a-b77b-bbff3acb0b07/BAM_Shoot+01_9.jpg" alt="Coffee Pour" class="w-full h-80 object-cover border-y-2 border-retro-900 filter sepia-[0.3] mb-16">
        <a href="index.html" class="inline-block border-2 border-retro-900 px-8 py-3 font-bold uppercase tracking-widest hover:bg-retro-900 hover:text-retro-100 transition duration-300">Back Home</a>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requestAnimationFrame(() => setTimeout(() => document.body.classList.add('loaded'), 50));
        });
    </script>
</body>
</html>
