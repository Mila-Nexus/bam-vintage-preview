<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location | BAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { retro: { 100: '#F5EFE6', 300: '#E8DFCA', 500: '#D55A3B', 700: '#783D19', 900: '#1A1A1A' } },
                    fontFamily: { 'serif': ['"DM Serif Display"', 'serif'], 'sans': ['"Syne"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700&display=swap');
        body { background-color: #F5EFE6; color: #1A1A1A; }
        .grain-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 50; opacity: 0.15; background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png'); mix-blend-mode: overlay; }
        body { opacity: 0; transition: opacity 0.5s ease-out; }
        body.loaded { opacity: 1; }
        body.exiting { opacity: 0; transition: opacity 0.4s ease-in; }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="grain-overlay"></div>
    <nav class="w-full py-6 px-8 flex justify-between items-center border-b-2 border-retro-900 bg-retro-900 text-retro-100 relative z-20">
        <a href="index.html" class="text-4xl font-serif tracking-tight">BAM.</a>
        <div class="hidden md:flex space-x-8 text-sm font-bold uppercase tracking-widest">
            <a href="coffee.html" class="hover:text-retro-500 transition duration-300">Coffee</a>
            <a href="vintage.html" class="hover:text-retro-500 transition duration-300">Vintage Shop</a>
            <a href="location.html" class="text-retro-500 transition duration-300">Location</a>
        </div>
        <button class="border-2 border-retro-100 px-6 py-2 text-sm font-bold uppercase hover:bg-retro-100 hover:text-retro-900 transition duration-300">Shop Online</button>
    </nav>
    <main class="py-24 px-8 md:px-16 max-w-4xl mx-auto text-center border-x-2 border-b-2 border-retro-900 bg-retro-100">
        <h1 class="font-serif text-7xl mb-12 text-retro-900">Find Us.</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-0 border-y-2 border-retro-900 text-left mb-16">
            <div class="p-10 border-b-2 md:border-b-0 md:border-r-2 border-retro-900">
                <h3 class="font-bold uppercase tracking-widest text-retro-500 mb-2">Location</h3>
                <p class="font-medium text-lg mb-8">Nithsdale Road,<br>Pollokshields,<br>Glasgow</p>
                <h3 class="font-bold uppercase tracking-widest text-retro-500 mb-2">Hours</h3>
                <p class="font-medium text-lg">Wed - Sun: 10am - 5pm<br>Mon & Tue: Closed</p>
            </div>
            <div class="p-10 bg-retro-300">
                <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" alt="Shop Front" class="w-full h-full object-cover border-2 border-retro-900 filter sepia-[0.3]">
            </div>
        </div>
        <a href="index.html" class="inline-block border-2 border-retro-900 px-8 py-3 font-bold uppercase tracking-widest hover:bg-retro-900 hover:text-retro-100 transition duration-300">Back Home</a>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requestAnimationFrame(() => setTimeout(() => document.body.classList.add('loaded'), 50));
        });
    </script>
</body>
</html>
